<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radvin Pakravan — Busy Growing Up</title>
    <meta name="description" content="Radvin Pakravan is a little adventurer, currently busy growing up. Come back in a few years to see how cool he becomes.">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Radvin Pakravan — Busy Growing Up">
    <meta property="og:description" content="Radvin Pakravan is busy growing up. Check back in a few years to see how tall, smart, and cool he gets.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Radvin Pakravan — Busy Growing Up">
    <meta name="twitter:description" content="Radvin Pakravan is currently learning, playing, and getting cooler every day.">

    <!-- Structured data for AI & search engines – name in both languages -->
    <script type="application/ld+json">
      {
            "@context": "https://schema.org",
            "@type": "Person",
            "name": "Radvin Pakravan",
            "alternateName": "رادوین پاکروان",
            "description": "Radvin Pakravan is a young child, currently busy growing up and exploring the world. This is his placeholder website.",
            "url": "https://radvinpakravan.ir"
        }
    </script>

    <style>
:root {
  --bg-deep: #0b132b;
  --text-light: #f0f6ff;
  --text-soft: #cbd5e1;
  --accent: #ff6e30;
  --blue-pop: #3b82f6;
  --bar-bg: rgba(255,255,255,0.12);
  --bar-fill: #4dabf7;
  --card-bg: rgba(255,255,255,0.07);
  --card-border: rgba(255,255,255,0.15);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, 'B Nazanin', sans-serif;
  background: radial-gradient(ellipse at 20% 20%, #1a2a5e 0%, #0a0f24 70%);
  background-attachment: fixed;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
  position: relative;
  padding: 16px;
  margin: 0;
}

/* Twinkling stars */
.star {
  position: absolute;
  background: #fffde7;
  border-radius: 50%;
  opacity: 0.7;
  animation: twinkle ease-in-out infinite alternate;
  pointer-events: none;
  z-index: 0;
}
@keyframes twinkle {
  0% { opacity: 0.4; transform: scale(0.7); }
  100% { opacity: 1; transform: scale(1.25); }
}

/* Shooting stars */
.shooting-star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 6px 2px #ffffff;
  animation: shoot linear infinite;
  pointer-events: none;
  z-index: 0;
}
.shooting-star::after {
  content: '';
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 60px;
  height: 1.5px;
  background: linear-gradient(90deg, rgba(255,255,255,0.8), transparent);
}
.shooting-star:nth-child(1) { top: -5%; left: 25%; animation-duration: 8s; animation-delay: 0s; }
.shooting-star:nth-child(2) { top: -5%; left: 65%; animation-duration: 10s; animation-delay: 4s; }
.shooting-star:nth-child(3) { top: -5%; left: 50%; animation-duration: 12s; animation-delay: 8s; }
@keyframes shoot {
  0% { transform: translate(0, 0) rotate(-25deg); opacity: 0; }
  10% { opacity: 1; }
  20% { opacity: 1; }
  100% { transform: translate(380px, 480px) rotate(-25deg); opacity: 0; }
}

/* ── Main page: flex column for responsive stacking ── */
.page {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 580px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  color: var(--text-light);
  gap: 0; /* spacing handled per element */
}

/* Cool astronaut helmet */
.helmet {
  width: clamp(80px, 15vh, 110px);
  height: clamp(80px, 15vh, 110px);
  margin: 0 auto 1.2vh;
  animation: float 3s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* ── H1: smaller font, more space below ── */
h1 {
  font-size: clamp(1.8rem, 4.8vw, 2.6rem);
  font-weight: 800;
  color: #ffffff;
  letter-spacing: -0.02em;
  text-shadow: 0 4px 20px rgba(0,0,0,0.5);
  margin: 0 0 2.2vh; /* ← increased space between H1 and tagline */
  line-height: 1.1;
}

.hidden-fa-name {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}

/* Tagline – sits right below H1 with breathing room */
.tagline {
  font-size: clamp(1.1rem, 2.2vw, 1.5rem);
  font-weight: 700;
  color: #e2e8f0;
  margin-bottom: 2.5vh;
  text-shadow: 0 2px 10px rgba(0,0,0,0.4);
}

/* ── Stats badges: flex row on desktop, column on mobile ── */
.stats {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  width: 100%;
  margin-bottom: 2.5vh;
}
.stat-badge {
  background: var(--card-bg);
  backdrop-filter: blur(6px);
  border: 1px solid var(--card-border);
  border-radius: 18px;
  padding: 12px 16px;
  min-width: 110px;
  flex: 1 1 130px;
  max-width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.stat-emoji {
  font-size: 1.4rem;
  margin-bottom: 2px;
}
.stat-label {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: #94a3b8;
  font-weight: 600;
  margin-bottom: 2px;
}
.stat-value {
  font-size: 0.9rem;
  font-weight: 700;
  color: #ffffff;
  line-height: 1.3;
  text-align: center;
}

/* ── Skill progress bars: flex row on desktop, column on mobile ── */
.skills {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  width: 100%;
  margin-bottom: 2vh;
}
.skill-item {
  background: var(--card-bg);
  backdrop-filter: blur(6px);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 10px 14px;
  min-width: 120px;
  flex: 1 1 130px;
  max-width: 100%;
  display: flex;
  flex-direction: column;
}
.skill-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
  font-size: 0.75rem;
  font-weight: 600;
  color: #e2e8f0;
}
.skill-bar {
  height: 8px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  overflow: hidden;
}
.skill-fill {
  height: 100%;
  border-radius: 10px;
  background: linear-gradient(90deg, #4dabf7, #74c0fc);
  transition: width 0.4s ease;
  width: var(--fill);
}

/* ── Footer note ── */
.footer-note {
  margin-top: 1vh;
  font-size: 0.85rem;
  color: #a5b4c0;
  font-style: italic;
  font-weight: 500;
  border-top: 1px solid rgba(255,255,255,0.1);
  padding-top: 12px;
  width: 100%;
}

/* ───────────────────────────────
   RESPONSIVE – mobile stacking
   ─────────────────────────────── */
@media (max-width: 520px) {
  .stats,
  .skills {
    flex-direction: column;
    align-items: center;
  }
  .stat-badge,
  .skill-item {
    max-width: 280px;
    width: 100%;
    flex: 0 0 auto;
  }
  .helmet {
    width: 80px;
    height: 80px;
    margin-bottom: 6px;
  }
  h1 {
    margin: 0 0 2vh; /* slightly tighter on very small screens but still spacious */
  }
}

/* Slightly taller screens: avoid cramping */
@media (min-height: 700px) {
  body {
    padding: 10px 16px;
  }
}

/* Wider desktop: keep badges & skills in rows without forced stacking */
@media (min-width: 521px) {
  .stats {
    flex-direction: row;
    flex-wrap: wrap;
  }
  .skills {
    flex-direction: row;
    flex-wrap: wrap;
  }
}
    </style>
  </head>
  <body>

    <!-- Stars -->
    <div id="starsContainer" aria-hidden="true"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>

    <div class="page">
      <!-- Astronaut helmet SVG -->
      <div class="helmet">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <!-- Straw 1 - red, tilted left -->
          <line x1="38" y1="55" x2="20" y2="15" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
          <line x1="20" y1="15" x2="12" y2="3" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
          <!-- Straw 2 - blue, tilted right -->
          <line x1="62" y1="55" x2="80" y2="15" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
          <line x1="80" y1="15" x2="88" y2="3" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
          <!-- Straw 3 - yellow, straight -->
          <line x1="50" y1="55" x2="50" y2="16" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
          <line x1="50" y1="16" x2="50" y2="5" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>

          <!-- Glass body -->
          <path d="M28 40 L32 85 L68 85 L72 40 Z" fill="#cbd5e1" opacity="0.35" stroke="#94a3b8" stroke-width="2.5" stroke-linejoin="round"/>

          <!-- Water inside the glass -->
          <path d="M31 58 L32 84 L68 84 L69 58 Z" fill="#38bdf8" opacity="0.7"/>

          <!-- Water surface wave -->
          <path d="M31 58 Q40 52 50 58 Q60 64 69 58" fill="none" stroke="#7dd3fc" stroke-width="2.5" stroke-linecap="round"/>

          <!-- Glass rim -->
          <rect x="28" y="36" width="44" height="6" rx="3" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>

          <!-- Glass base -->
          <rect x="30" y="84" width="40" height="5" rx="2" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>

          <!-- Bubbles -->
          <circle cx="40" cy="72" r="2.5" fill="#bae6fd" opacity="0.9"/>
          <circle cx="55" cy="65" r="3" fill="#bae6fd" opacity="0.8"/>
          <circle cx="62" cy="76" r="2" fill="#bae6fd" opacity="0.9"/>
          <circle cx="45" cy="60" r="1.8" fill="#bae6fd" opacity="0.7"/>
        </svg>
      </div>

      <h1 id="nameEn">Radvin Pakravan</h1>
      <h1 class="hidden-fa-name" lang="fa" id="nameFaHidden">رادوین پاکروان</h1>
      <p class="tagline" id="tagline">I'm busy growing up!</p>

      <div class="stats">
        <div class="stat-badge">
          <span class="stat-emoji">📏</span>
          <span class="stat-label" id="stat1Label">Height</span>
          <span class="stat-value" id="stat1Value">Growing daily</span>
        </div>
        <div class="stat-badge">
          <span class="stat-emoji">🧠</span>
          <span class="stat-label" id="stat2Label">Currently</span>
          <span class="stat-value" id="stat2Value">Exploring</span>
        </div>
        <div class="stat-badge">
          <span class="stat-emoji">⏳</span>
          <span class="stat-label" id="stat3Label">Come back</span>
          <span class="stat-value" id="stat3Value">In a few years</span>
        </div>
      </div>

      <!-- Skill progress bars -->
      <div class="skills" id="skillsContainer">
        <!-- Filled by JS -->
      </div>

      <p class="footer-note" id="footer">🌱 Come back later — I'll be taller, smarter, and probably even cooler.</p>
    </div>

    <script>
      (function() {
        // ==========================================
        // ✏️ CHANGE THE NAME HERE – everything updates automatically
        // ==========================================
        const NAME_EN = "Radvin Pakravan";      // English name
        const NAME_FA = "رادوین پاکروان";       // Persian/Farsi name (transliteration)

        // Skill data – easily adjustable percentages
        const skills = [
          { emoji: "🚶", label: "Walking", percent: 100 },
          { emoji: "🔤", label: "ABCs", percent: 48 },
          { emoji: "🔢", label: "Counting", percent: 26 },
          { emoji: "🗣️", label: "Talking", percent: 8 },
        ];

        // Update visible names
        document.getElementById('nameEn').textContent = NAME_EN;
        const hiddenFa = document.getElementById('nameFaHidden');
        hiddenFa.textContent = NAME_FA;
        hiddenFa.setAttribute('lang', 'fa');

        // Update meta tags & title
        document.title = `${NAME_EN} — Busy Growing Up`;
        const metaDesc = document.querySelector('meta[name="description"]');
        if (metaDesc) metaDesc.setAttribute('content', `${NAME_EN} is a little adventurer, currently busy growing up. Come back in a few years to see how cool he becomes.`);
        document.querySelector('meta[property="og:title"]')?.setAttribute('content', `${NAME_EN} — Busy Growing Up`);
        document.querySelector('meta[property="og:description"]')?.setAttribute('content', `${NAME_EN} is busy growing up. Check back in a few years.`);
        document.querySelector('meta[name="twitter:title"]')?.setAttribute('content', `${NAME_EN} — Busy Growing Up`);
        document.querySelector('meta[name="twitter:description"]')?.setAttribute('content', `${NAME_EN} is currently learning, playing, and getting cooler every day.`);

        // Update JSON-LD
        const ldJson = {
          "@context": "https://schema.org",
          "@type": "Person",
          "name": NAME_EN,
          "alternateName": NAME_FA,
          "description": `${NAME_EN} is a young child, currently busy growing up and exploring the world. This is his placeholder website.`,
          "url": "https://radvinpakravan.ir"
        };
        const oldLd = document.querySelector('script[type="application/ld+json"]');
        if (oldLd) oldLd.remove();
        const ldScript = document.createElement('script');
        ldScript.type = 'application/ld+json';
        ldScript.textContent = JSON.stringify(ldJson);
        document.head.appendChild(ldScript);

        // Build skill bars
        const skillsContainer = document.getElementById('skillsContainer');
        skills.forEach(skill => {
          const item = document.createElement('div');
          item.className = 'skill-item';
          item.innerHTML = `
                <div class="skill-header">
                    <span>${skill.emoji} ${skill.label}</span>
                    <span>${skill.percent}%</span>
                </div>
                <div class="skill-bar">
                    <div class="skill-fill" style="--fill:${skill.percent}%; width:${skill.percent}%"></div>
                </div>
            `;
          skillsContainer.appendChild(item);
        });

        // Generate stars
        function createStars() {
          const container = document.getElementById('starsContainer');
          const count = 70;
          for (let i = 0; i < count; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 1.5;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 4 + 's';
            star.style.animationDuration = (Math.random() * 3 + 2) + 's';
            container.appendChild(star);
          }
        }
        createStars();
      })();
    </script>
  </body>
</html>
